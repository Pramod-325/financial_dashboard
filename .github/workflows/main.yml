name: Deploy React App to GitHub Pages

on:
  # Trigger the workflow on pushes to the main branch
  push:
    branches: ["main"]
    paths-ignore:
      - 'README.md'
      - 'docs/**'       # Ignores everything in the docs folder
      - '**/*.md'       # Ignores all markdown files anywhere in the repo
      - '.gitignore'
      - 'LICENSE'
  # Allow manual triggering from the Actions tab
  workflow_dispatch:

# Set permissions for the GITHUB_TOKEN to allow deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Prevent concurrent deployments from overwriting each other
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # Single build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm' # Use 'yarn' or 'pnpm' if you aren't using npm

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload build artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # VERY IMPORTANT: Adjust this path based on your bundler!
          # Use './dist' for Vite
          # Use './build' for Create React App
          path: './dist'

  # Single deploy job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
